yolo_detector:
  ros__parameters:
    image_topic: /camera/color/image_raw
    objects_topic: /detector/objects
    debug_image_topic: /detector/debug_image
    engine_path: ''
    model_path: ''
    mobileclip_path: ''
    model_kind: auto
    class_names_path: ''
    yoloe_classes_path: ''
    input_width: 640
    input_height: 640
    imgsz: 640
    conf_thres: 0.25
    iou_thres: 0.45
    publish_debug_image: true
    device: ''
    prompt_free: false
    best_handle_only: false
    detect_blue_point: false
    blue_point_class_name: red sticker push point
    press_point_mode: red_sticker
    press_point_vertical_ratio: 0.50
    blue_point_min_area: 40.0
    blue_point_max_area_ratio: 0.02
    roi_mean_filter_enabled: false
    roi_mean_filter_window: 3
    roi_mean_filter_max_jump_px: 40.0
    roi_mean_filter_max_missed: 2
    prompts: 'lever door handle,horizontal door handle,door lever handle,pull door handle'
    backend: mock

coordinate_projector:
  ros__parameters:
    objects_topic: /detector/objects
    depth_topic: /camera/aligned_depth_to_color/image_raw
    camera_info_topic: /camera/color/camera_info
    objects_3d_topic: /detector/objects_3d
    target_point_topic: /detector/target_point
    target_pose_topic: /detector/target_pose
    target_joint_state_topic: /detector/target_joint_state
    current_ee_point_topic: /detector/current_ee_point
    press_point_ground_ratio: 0.80
    target_frame: ''
    handeye_mode: eye-to-hand
    handeye_npy_path: ''
    handeye_target_frame: base_link
    robot_model: h2
    workspace_root: /home/unitree/MscapeTech
    urdf_path: ''
    base_link: ''
    hand_link: ''
    camera_link: ''
    network_interface: ''
    domain_id: 0
    lowstate_topic: rt/lowstate
    joint_json_path: ''
    lock_waist: true
    h2_ee_offset_xyz: [0.05, 0.0, 0.0]
    class_filter: ''
    min_confidence: 0.25
    depth_radius: 3
    depth_scale: 0.001
    min_depth_m: 0.10
    max_depth_m: 5.0
    publish_invalid: false
    publish_target_pose: true
    target_pose_orientation_xyzw: [0.0, 0.0, 0.0, 1.0]
    publish_target_joint_state: false
    publish_failed_ik_solution: false
    ik_target_link: ''
    ik_active_joints: ''
    ik_end_effector_offset_xyz: [0.0, 0.0, 0.0]
    ik_target_position_offset_xyz: [0.0, 0.0, 0.0]
    ik_max_iterations: 120
    ik_tolerance_position: 0.005
    ik_tolerance_orientation: 3.2
    ik_damping: 0.001
    ik_step_scale: 0.4
    ik_position_weight: 1.0
    ik_orientation_weight: 0.0
    stale_depth_sec: 0.5
    transform_timeout_sec: 0.05

web_dashboard:
  ros__parameters:
    web_host: '0.0.0.0'
    web_port: 8080
    jpeg_quality: 80
    frame_timeout_sec: 2.0
    debug_image_topic: /detector/debug_image
    objects_topic: /detector/objects
    objects_3d_topic: /detector/objects_3d
    target_point_topic: /detector/target_point
    target_pose_topic: /detector/target_pose
    target_joint_state_topic: /detector/target_joint_state
    current_ee_point_topic: /detector/current_ee_point
